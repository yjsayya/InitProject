spring:
  kafka:
    producer:
      # ────────────────────────────────────────────────────────────────
      # Spring Boot 공식 단축 속성
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      client-id: ""
      acks: "-1"
      retries: 2147483647
      batch-size: 16384
      buffer-memory: 33554432
      compression-type: none
      transaction-id-prefix:
      properties:
        ### 타이밍 / 배치 ###################################################
        linger.ms: 5
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        max.block.ms: 60000

        # 요청 크기 / 연결
        max.request.size: 1048576
        max.in.flight.requests.per.connection: 5
        connections.max.idle.ms: 540000

        # 멱등성 / 트랜잭션
        enable.idempotence: true
        transaction.timeout.ms: 60000
        # 메타데이터
        metadata.max.age.ms: 300000
        metadata.max.idle.ms: 300000
        # 재시도 / 백오프
        retry.backoff.ms: 100
        retry.backoff.max.ms: 1000
        # DNS
        client.dns.lookup: use_all_dns_ips
        # 소켓 / 네트워크
        send.buffer.bytes: 131072
        receive.buffer.bytes: 32768
        socket.connection.setup.timeout.ms: 10000
        socket.connection.setup.timeout.max.ms: 30000
        reconnect.backoff.ms: 50
        reconnect.backoff.max.ms: 1000
        # 압축 세부 설정
        compression.gzip.level: -1
        compression.lz4.level: 9
        compression.zstd.level: 3
        # 보안 (SSL / SASL) - 필요 시 주석 해제
        # security.protocol: PLAINTEXT
        # ssl.keystore.location:
        # ssl.keystore.password:
        # ssl.key.password:
        # ssl.truststore.location:
        # ssl.truststore.password:
        # ssl.protocol: TLSv1.3
        # ssl.enabled.protocols: TLSv1.2,TLSv1.3
        # sasl.mechanism: GSSAPI
        # sasl.jaas.config:

# ════════════════════════════════════════════════════════════════════════
# 설정 설명
# ════════════════════════════════════════════════════════════════════════
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ Spring Boot 공식 단축 속성                                           │
# └─────────────────────────────────────────────────────────────────────┘
#
# bootstrap-servers: localhost:9092
#   브로커 주소. 콤마로 여러 개 지정 가능
#   ex) host1:9092,host2:9092,host3:9092
#   기본값: 없음 (필수)
#
# key-serializer / value-serializer
#   메시지 key/value 직렬화 클래스
#   StringSerializer    → 문자열
#   IntegerSerializer   → 정수
#   ByteArraySerializer → 바이트
#   JsonSerializer      → JSON (spring-kafka 제공)
#   기본값: 없음 (필수)
#
# client-id: ""
#   프로듀서 식별자. 브로커 로그/모니터링에서 출처 식별에 사용
#   기본값: "" (빈 문자열)
#
# acks: "-1"
#   전송 확인 방식
#   "0"  → 브로커 응답 안 기다림 (가장 빠름, 유실 가능)
#   "1"  → 리더 파티션 저장 확인
#   "-1" → 모든 replica 저장 확인 (가장 안전) = "all" 과 동일
#   기본값: "-1"
#
# retries: 2147483647
#   일시적 오류 발생 시 재시도 횟수
#   delivery.timeout.ms 가 먼저 만료되면 재시도 횟수가 남아도 중단
#   일반적으로 이 값보다 delivery.timeout.ms 로 재시도 범위 제어 권장
#   기본값: 2147483647 (Integer.MAX_VALUE)
#
# batch-size: 16384
#   파티션별 배치 최대 크기 (bytes 단위)
#   이 크기에 도달하면 linger.ms 대기 없이 즉시 전송
#   0 으로 설정하면 배치 완전 비활성화
#   기본값: 16384 (16KB)
#
# buffer-memory: 33554432
#   RecordAccumulator 전체 버퍼 메모리 (bytes 단위)
#   버퍼가 꽉 차면 max.block.ms 동안 대기 후 예외 발생
#   기본값: 33554432 (32MB)
#
# compression-type: none
#   배치 단위 압축 방식
#   none  → 압축 안함
#   gzip  → 높은 압축률, CPU 사용 많음
#   snappy→ 중간 압축률, CPU 적음 (범용 추천)
#   lz4   → 빠른 속도, 낮은 압축률
#   zstd  → 높은 압축률 + 빠름 (최신 추천)
#   기본값: none
#
# transaction-id-prefix:
#   트랜잭션 ID 접두사. 설정 시 exactly-once 트랜잭션 모드 활성화
#   활성화 시 transaction.timeout.ms 설정도 함께 확인 필요
#   기본값: null (트랜잭션 비활성)
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 타이밍 / 배치                                                        │
# └─────────────────────────────────────────────────────────────────────┘
#
# linger.ms: 5
#   배치 전송 전 대기 시간 (ms)
#   이 시간 동안 같은 파티션 레코드를 모아 한 번에 전송
#   높일수록 처리량↑, latency↑
#   batch.size 가 먼저 차면 linger.ms 무시하고 즉시 전송
#   Kafka 4.0 부터 기본값 0 → 5 로 변경
#   기본값: 5
#
# delivery.timeout.ms: 120000
#   send() 호출부터 최종 성공/실패까지 총 허용 시간 (ms)
#   retries 횟수가 남아도 이 시간 초과 시 실패 처리
#   반드시 delivery.timeout.ms >= linger.ms + request.timeout.ms 이어야 함
#   기본값: 120000 (2분)
#
# request.timeout.ms: 30000
#   브로커에 요청 후 응답 대기 시간 (ms)
#   초과 시 재시도 또는 예외 발생
#   기본값: 30000 (30초)
#
# max.block.ms: 60000
#   버퍼 꽉 찼을 때 send() 블로킹 최대 대기 시간 (ms)
#   초과 시 TimeoutException 발생
#   기본값: 60000 (1분)
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 요청 크기 / 연결                                                     │
# └─────────────────────────────────────────────────────────────────────┘
#
# max.request.size: 1048576
#   단일 요청 최대 크기 (bytes)
#   이 크기 초과 레코드는 전송 실패
#   브로커의 message.max.bytes 와 맞춰서 설정 필요
#   기본값: 1048576 (1MB)
#
# max.in.flight.requests.per.connection: 5
#   브로커 응답 대기 없이 동시 전송 가능한 최대 요청 수
#   1 → 순서 100% 보장 (처리량↓)
#   enable.idempotence=true 이면 5 이하 자동 강제
#   기본값: 5
#
# connections.max.idle.ms: 540000
#   유휴 커넥션 유지 시간 (ms)
#   이 시간 동안 사용 없으면 커넥션 자동 종료
#   기본값: 540000 (9분)
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 멱등성 / 트랜잭션                                                    │
# └─────────────────────────────────────────────────────────────────────┘
#
# enable.idempotence: true
#   멱등성 프로듀서 활성화
#   네트워크 오류로 인한 중복 전송 방지 + 파티션 내 순서 보장
#   활성화 시 자동 강제 적용:
#     acks=all
#     retries > 0
#     max.in.flight.requests.per.connection <= 5
#   기본값: true (Kafka 3.0+)
#
# transaction.timeout.ms: 60000
#   트랜잭션 타임아웃 (ms)
#   transaction-id-prefix 설정 시에만 유효
#   브로커의 transaction.max.timeout.ms 보다 작아야 함
#   기본값: 60000 (1분)
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 메타데이터                                                           │
# └─────────────────────────────────────────────────────────────────────┘
#
# metadata.max.age.ms: 300000
#   브로커 메타데이터 강제 갱신 주기 (ms)
#   파티션 리더 변경 등을 주기적으로 감지
#   기본값: 300000 (5분)
#
# metadata.max.idle.ms: 300000
#   사용하지 않는 토픽의 메타데이터 캐시 유지 시간 (ms)
#   초과 시 해당 토픽 메타데이터 만료 처리
#   기본값: 300000 (5분)
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 재시도 / 백오프                                                      │
# └─────────────────────────────────────────────────────────────────────┘
#
# retry.backoff.ms: 100
#   실패 후 재시도 전 초기 대기 시간 (ms)
#   기본값: 100
#
# retry.backoff.max.ms: 1000
#   재시도 최대 대기 시간 (ms)
#   재시도마다 대기 시간이 지수적으로 증가하며 이 값을 상한으로 함
#   기본값: 1000
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ DNS                                                                  │
# └─────────────────────────────────────────────────────────────────────┘
#
# client.dns.lookup: use_all_dns_ips
#   DNS 조회 방식
#   use_all_dns_ips                       → 반환된 모든 IP 순차 연결 시도
#   resolve_canonical_bootstrap_servers_only → 정식 호스트명으로 해석 후 연결
#   기본값: use_all_dns_ips
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 소켓 / 네트워크                                                      │
# └─────────────────────────────────────────────────────────────────────┘
#
# send.buffer.bytes: 131072
#   TCP 소켓 전송 버퍼 크기 (bytes)
#   -1 이면 OS 기본값 사용
#   기본값: 131072 (128KB)
#
# receive.buffer.bytes: 32768
#   TCP 소켓 수신 버퍼 크기 (bytes)
#   -1 이면 OS 기본값 사용
#   기본값: 32768 (32KB)
#
# socket.connection.setup.timeout.ms: 10000
#   소켓 연결 수립 초기 대기 시간 (ms)
#   기본값: 10000 (10초)
#
# socket.connection.setup.timeout.max.ms: 30000
#   소켓 연결 수립 최대 대기 시간 (ms)
#   재연결 시도마다 지수 증가하며 이 값을 상한으로 함
#   기본값: 30000 (30초)
#
# reconnect.backoff.ms: 50
#   브로커 재연결 초기 대기 시간 (ms)
#   기본값: 50
#
# reconnect.backoff.max.ms: 1000
#   브로커 재연결 최대 대기 시간 (ms)
#   재연결 시도마다 지수 증가하며 이 값을 상한으로 함
#   기본값: 1000
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 압축 세부 설정                                                       │
# └─────────────────────────────────────────────────────────────────────┘
#
# compression.gzip.level: -1
#   gzip 압축 레벨 (compression-type: gzip 일 때만 유효)
#   -1 → 기본 압축 / 1(빠름, 낮은 압축) ~ 9(느림, 높은 압축)
#   기본값: -1
#
# compression.lz4.level: 9
#   lz4 압축 레벨 (compression-type: lz4 일 때만 유효)
#   유효값: 1~17
#   기본값: 9
#
# compression.zstd.level: 3
#   zstd 압축 레벨 (compression-type: zstd 일 때만 유효)
#   유효값: -131072~22
#   기본값: 3
#
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ 보안 (SSL / SASL)                                                    │
# └─────────────────────────────────────────────────────────────────────┘
#
# security.protocol: PLAINTEXT
#   브로커 통신 프로토콜
#   PLAINTEXT      → 암호화 없음 (기본)
#   SSL            → SSL/TLS 암호화
#   SASL_PLAINTEXT → SASL 인증 + 암호화 없음
#   SASL_SSL       → SASL 인증 + SSL/TLS 암호화
#   기본값: PLAINTEXT
#
# ssl.keystore.location:
#   클라이언트 인증서 keystore 파일 경로 (양방향 TLS 시 필요)
#   기본값: null
#
# ssl.keystore.password:
#   keystore 파일 비밀번호
#   기본값: null
#
# ssl.key.password:
#   keystore 내 private key 비밀번호
#   기본값: null
#
# ssl.truststore.location:
#   브로커 인증서 검증용 truststore 파일 경로
#   기본값: null
#
# ssl.truststore.password:
#   truststore 파일 비밀번호
#   기본값: null
#
# ssl.protocol: TLSv1.3
#   사용할 SSL 프로토콜
#   기본값: TLSv1.3
#
# ssl.enabled.protocols: TLSv1.2,TLSv1.3
#   허용할 SSL 프로토콜 목록 (콤마 구분)
#   기본값: TLSv1.2,TLSv1.3
#
# sasl.mechanism: GSSAPI
#   SASL 인증 방식 (security.protocol 에 SASL 포함 시 사용)
#   GSSAPI        → Kerberos 인증
#   PLAIN         → 단순 ID/PW 인증
#   SCRAM-SHA-256 → 해시 기반 인증
#   SCRAM-SHA-512 → 해시 기반 인증 (강화)
#   OAUTHBEARER   → OAuth 2.0 토큰 인증
#   기본값: GSSAPI
#
# sasl.jaas.config:
#   JAAS 로그인 모듈 설정 (PLAIN 예시)
#   org.apache.kafka.common.security.plain.PlainLoginModule required
#   username="user" password="password";
#   기본값: null