<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/mainLayout}">

<th:block layout:fragment="pageScript">
    <script th:src="@{/js/home.js}" defer></script>
</th:block>

<div layout:fragment="content">

    <!-- 페이지 헤더 -->
    <div style="margin-bottom: 1.5rem;">
        <h2 style="font-size: 1.375rem; font-weight: 800; color: #0F172A; letter-spacing: -0.3px;">
            대시보드
        </h2>
        <p style="font-size: 0.875rem; color: #94A3B8; margin-top: 0.25rem;">
            시스템 현황을 한눈에 확인하세요
        </p>
    </div>

    <!-- 스탯 카드 -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem;">

        <div class="stat-card">
            <div>
                <p class="stat-label">총 사용자</p>
                <p class="stat-value">1,234</p>
                <p class="stat-trend up">
                    <i data-lucide="trending-up" style="width:14px; height:14px;"></i>
                    +12% 이번 달
                </p>
            </div>
            <div class="stat-icon" style="background-color: #EEF2FF;">
                <i data-lucide="users" style="width:22px; height:22px; color:#3B5BDB;"></i>
            </div>
        </div>

        <div class="stat-card">
            <div>
                <p class="stat-label">활성 사용자</p>
                <p class="stat-value">856</p>
                <p class="stat-trend up">
                    <i data-lucide="trending-up" style="width:14px; height:14px;"></i>
                    +8% 이번 주
                </p>
            </div>
            <div class="stat-icon" style="background-color: #ECFDF5;">
                <i data-lucide="user-check" style="width:22px; height:22px; color:#0F9D6B;"></i>
            </div>
        </div>

        <div class="stat-card">
            <div>
                <p class="stat-label">총 주문</p>
                <p class="stat-value">3,456</p>
                <p class="stat-trend down">
                    <i data-lucide="trending-down" style="width:14px; height:14px;"></i>
                    -2% 이번 주
                </p>
            </div>
            <div class="stat-icon" style="background-color: #FFFBEB;">
                <i data-lucide="shopping-cart" style="width:22px; height:22px; color:#B45309;"></i>
            </div>
        </div>

        <div class="stat-card">
            <div>
                <p class="stat-label">매출</p>
                <p class="stat-value">₩12.3M</p>
                <p class="stat-trend up">
                    <i data-lucide="trending-up" style="width:14px; height:14px;"></i>
                    +15% 이번 달
                </p>
            </div>
            <div class="stat-icon" style="background-color: #F0F9FF;">
                <i data-lucide="circle-dollar-sign" style="width:22px; height:22px; color:#0284C7;"></i>
            </div>
        </div>

    </div>

    <!-- 테이블 카드 -->
    <div class="card">
        <div class="section-header">
            <div>
                <p class="section-title">최근 사용자</p>
                <p class="section-subtitle">최근 가입한 사용자 목록입니다</p>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <div class="search-wrap">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="keyword" class="input" placeholder="이름, 이메일 검색..."
                           style="width: 220px; padding-left: 2.25rem;"
                           onkeypress="if(event.key==='Enter') homeHandler.handler.onSearch()">
                </div>
                <button class="btn btn-primary" onclick="homeHandler.handler.onSearch()">
                    <i data-lucide="search" style="width:15px; height:15px;"></i>
                    검색
                </button>
                <button class="btn btn-secondary" onclick="homeHandler.handler.onReset()">
                    초기화
                </button>
            </div>
        </div>

        <div class="table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th>사용자</th>
                        <th>이메일</th>
                        <th>상태</th>
                        <th>가입일</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody id="userList">
                    <tr class="table-empty">
                        <td colspan="5">데이터를 불러오는 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이징 -->
        <div id="pagingContainer"
             style="display: flex; justify-content: center; align-items: center;
                    gap: 0.25rem; margin-top: 1.25rem; padding-top: 1.25rem;
                    border-top: 1px solid #E2E8F0;">
        </div>
    </div>

</div>
</html>
